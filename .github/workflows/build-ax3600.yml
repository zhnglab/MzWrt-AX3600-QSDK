name: Build MzWRT AX3600 QSDK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-ax3600.yml'
      - 'configs/**'
      - 'overlay/**'
      - 'scripts/**'

permissions:
  contents: read

concurrency:
  group: ax3600-qsdk-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Maximize build disk
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 4096
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout build project
        uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-distutils \
            rsync unzip zlib1g-dev file wget curl subversion swig time xsltproc \
            zstd cpio qemu-utils libelf-dev device-tree-compiler ca-certificates \
            patch perl tar xz-utils
          sudo ln -sf /usr/bin/python3 /usr/local/bin/python
          git config --global http.version HTTP/1.1
          git config --global advice.detachedHead false

      - name: Verify project customization
        run: bash scripts/verify-customization.sh

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: qsdk/dl
          key: qsdk-ax3600-dl-${{ hashFiles('configs/ax3600.config') }}
          restore-keys: |
            qsdk-ax3600-dl-

      - name: Build firmware
        run: bash scripts/build.sh

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MzWRT-AX3600-QSDK
          path: output/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MzWRT-AX3600-build-diagnostics
          path: |
            build.log
            final.config
            source-commit.txt
          if-no-files-found: ignore
          retention-days: 7
