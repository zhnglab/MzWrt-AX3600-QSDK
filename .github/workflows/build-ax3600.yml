name: Build MzWRT AX3600 QSDK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-ax3600.yml'
      - 'configs/**'
      - 'overlay/**'
      - 'scripts/**'

permissions:
  contents: read

concurrency:
  group: ax3600-qsdk-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Maximize build disk
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 4096
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout build project
        uses: actions/checkout@v4

      - name: Move Docker storage to expanded disk
        shell: bash
        run: |
          set -euo pipefail
          sudo systemctl stop docker
          mkdir -p "$GITHUB_WORKSPACE/.docker-data"
          printf '{"data-root":"%s"}\n' "$GITHUB_WORKSPACE/.docker-data" | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          test "$(docker info --format '{{.DockerRootDir}}')" = "$GITHUB_WORKSPACE/.docker-data"
          echo "Docker root: $(docker info --format '{{.DockerRootDir}}')"
          df -h / "$GITHUB_WORKSPACE"
          test "$(df --output=avail -k "$GITHUB_WORKSPACE" | tail -1)" -gt 52428800

      - name: Verify project customization
        run: bash scripts/verify-customization.sh

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: qsdk/dl
          key: qsdk-ax3600-dl-${{ hashFiles('configs/ax3600.config') }}
          restore-keys: |
            qsdk-ax3600-dl-

      - name: Build firmware in Ubuntu 20.04
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/build" \
            -w /build \
            -e DEBIAN_FRONTEND=noninteractive \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            ubuntu:20.04 bash -lc '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
                gettext git libncurses5-dev libssl-dev python2 python3 python3-distutils \
                rsync unzip zlib1g-dev file wget curl subversion swig time xsltproc \
                zstd cpio qemu-utils libelf-dev device-tree-compiler ca-certificates \
                patch perl tar xz-utils sudo
              ln -sf /usr/bin/python2 /usr/local/bin/python
              groupadd -g "$HOST_GID" builder
              useradd -m -u "$HOST_UID" -g "$HOST_GID" -s /bin/bash builder
              python --version
              python3 --version
              su -s /bin/bash builder -c "
                set -e
                cd /build
                git config --global http.version HTTP/1.1
                git config --global advice.detachedHead false
                bash scripts/build.sh
              "
            '
          status=$?
          sudo chown -R "$(id -u):$(id -g)" \
            "$GITHUB_WORKSPACE/output" \
            "$GITHUB_WORKSPACE/build.log" \
            "$GITHUB_WORKSPACE/final.config" \
            "$GITHUB_WORKSPACE/source-commit.txt" 2>/dev/null || true
          exit "$status"

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MzWRT-AX3600-QSDK
          path: output/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MzWRT-AX3600-build-diagnostics
          path: |
            build.log
            final.config
            source-commit.txt
          if-no-files-found: ignore
          retention-days: 7
